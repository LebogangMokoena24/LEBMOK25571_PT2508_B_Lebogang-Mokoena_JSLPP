<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />

    <script defer src="./scripts/main.js" type="module"></script>

    <title>Kanban Task Management</title>
  </head>

  <body>
    <!-- SIDEBAR -->
    <nav class="side-bar" id="side-bar-div">
      <div id="side-logo-div">
        <img id="logo" src="./assets/logo-light.svg" alt="Kanban logo" />
      </div>

      <div class="boards-nav-links-div" id="boards-nav-links-div">
        <h4 id="headline-sidepanel">ALL BOARDS (1)</h4>

        <button class="board-btn active-board-btn" id="board-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <rect width="1" height="16" fill="currentColor" />
            <rect x="3" width="1" height="16" fill="currentColor" />
            <rect x="6" y="5" width="10" height="2" fill="currentColor" />
            <rect x="6" y="10" width="10" height="1" fill="currentColor" />
          </svg>
          Launch Career
        </button>
      </div>

      <div class="sidebar-bottom">
        <div class="theme-toggle-div">
          <img src="./assets/icon-light-theme.svg" alt="light mode icon" />
          <label class="switch" aria-label="Toggle dark mode">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider round"></span>
          </label>
          <img src="./assets/icon-dark-theme.svg" alt="dark mode icon" />
        </div>

        <button class="hide-sidebar-btn" id="hide-sidebar-btn">
          <img src="./assets/icon-hide-sidebar.svg" alt="" aria-hidden="true" />
          <span>Hide Sidebar</span>
        </button>
      </div>
    </nav>

    <!-- SHOW SIDEBAR BUTTON -->
    <button
      class="show-sidebar-btn"
      id="show-sidebar-btn"
      aria-label="Show Sidebar"
    >
      <img src="./assets/icon-show-sidebar.svg" alt="" />
    </button>

    <!-- MAIN LAYOUT -->
    <div id="layout">
      <header id="header">
        <div class="header-name-div">
          <img
            src="./assets/favicon.svg"
            alt="Kanban logo"
            class="logo-mobile"
            id="mobile-logo"
          />

          <h2 id="header-board-name">Launch Career</h2>

          <span
            class="mobile-chevron"
            id="mobile-chevron"
            aria-label="Open mobile menu"
          >
            &#9660;
          </span>
        </div>

        <button id="add-new-task-btn" class="primary-btn">
          + Add New Task
        </button>
      </header>

      <!-- STATES -->
      <div id="loading-message" class="loading-message">
        Loading tasks...
      </div>

      <div
        id="error-message"
        class="error-message"
        style="display: none"
        role="alert"
      >
        ⚠️ Failed to load tasks from server.
      </div>

      <!-- BOARD -->
      <div class="container">
        <main class="card-column-main">
          <div class="column-div" data-status="todo">
            <div class="column-head-div">
              <span class="dot"></span>
              <h4>TODO (0)</h4>
            </div>
            <div class="tasks-container" id="todo-tasks"></div>
          </div>

          <div class="column-div" data-status="doing">
            <div class="column-head-div">
              <span class="dot"></span>
              <h4>DOING (0)</h4>
            </div>
            <div class="tasks-container" id="doing-tasks"></div>
          </div>

          <div class="column-div" data-status="done">
            <div class="column-head-div">
              <span class="dot"></span>
              <h4>DONE (0)</h4>
            </div>
            <div class="tasks-container" id="done-tasks"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- MOBILE MENU -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay">
      <div class="mobile-menu">
        <div class="mobile-menu-header">
          <h4>ALL BOARDS (1)</h4>

          <!-- FIX: now properly usable -->
          <button
            class="mobile-close-btn"
            id="mobile-close-btn"
            aria-label="Close menu"
            type="button"
          >
            &times;
          </button>
        </div>

        <button class="board-btn active-board-btn mobile-board-btn">
          Launch Career
        </button>

        <div class="theme-toggle-div mobile-theme-toggle">
          <img src="./assets/icon-light-theme.svg" alt="" />
          <label class="switch" aria-label="Toggle dark mode mobile">
            <input type="checkbox" id="theme-toggle-mobile" />
            <span class="slider round"></span>
          </label>
          <img src="./assets/icon-dark-theme.svg" alt="" />
        </div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <dialog id="task-modal">
      <div>
        <div class="modal-header">
          <h3 id="task-modal-heading">Task</h3>

          <button type="button" id="close-modal-btn" aria-label="Close modal">
            &times;
          </button>
        </div>

        <label for="task-title">Title</label>
        <input id="task-title" type="text" required />

        <label for="task-desc">Description</label>
        <textarea id="task-desc" rows="4"></textarea>

        <label for="task-status">Status</label>
        <select id="task-status">
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <label for="task-priority">Priority</label>
        <select id="task-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <button id="save-task-btn">Save Changes</button>
        <button id="delete-task-btn">Delete Task</button>
      </div>
    </dialog>

    <!-- ADD TASK MODAL -->
    <dialog id="new-task-dialog">
      <form id="new-task-modal-window">
        <div class="modal-header">
          <h3>Add New Task</h3>

          <button type="button" id="cancel-add-btn" aria-label="Close">
            &times;
          </button>
        </div>

        <input id="title-input" placeholder="Title" required />
        <textarea id="desc-input" placeholder="Description"></textarea>

        <select id="select-status">
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <select id="select-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <button type="submit">Create Task</button>
      </form>
    </dialog>
  </body>
</html>
