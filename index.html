<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />

    <script defer src="./scripts/main.js" type="module"></script>

    <title>Kanban Task Management</title>
  </head>

  <body>
    <!-- SIDEBAR -->
    <nav class="side-bar" id="side-bar-div">
      <div id="side-logo-div">
        <img id="logo" src="./assets/logo-light.svg" alt="Kanban logo" />
      </div>

      <div class="boards-nav-links-div">
        <h4>ALL BOARDS (1)</h4>
        <button class="board-btn active-board-btn">
          Launch Career
        </button>
      </div>

      <div class="sidebar-bottom">
        <div class="theme-toggle-div">
          <img src="./assets/icon-light-theme.svg" alt="light mode icon" />
          <label class="switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider round"></span>
          </label>
          <img src="./assets/icon-dark-theme.svg" alt="dark mode icon" />
        </div>

        <button class="hide-sidebar-btn" id="hide-sidebar-btn">
          Hide Sidebar
        </button>
      </div>
    </nav>

    <!-- SHOW SIDEBAR BUTTON -->
    <button id="show-sidebar-btn" class="show-sidebar-btn"></button>

    <!-- MAIN -->
    <div id="layout">
      <header>
        <div class="header-name-div">
          <img
            src="./assets/favicon.svg"
            class="logo-mobile"
            id="mobile-logo"
            alt="logo"
          />
          <h2>Launch Career</h2>
          <span id="mobile-chevron">&#9660;</span>
        </div>

        <button id="add-new-task-btn">+ Add New Task</button>
      </header>

      <!-- STATES -->
      <div id="loading-message" class="loading-message">
        Loading tasks...
      </div>

      <div id="error-message" class="error-message" style="display: none">
        Failed to load tasks.
      </div>

      <!-- BOARD -->
      <div class="container">
        <main class="card-column-main">
          <div class="column-div" data-status="todo">
            <div class="column-head-div">
              <span class="dot" id="todo-dot"></span>
              <h4 id="toDoText">TODO (0)</h4>
            </div>
            <div class="tasks-container" id="todo-tasks"></div>
          </div>

          <div class="column-div" data-status="doing">
            <div class="column-head-div">
              <span class="dot" id="doing-dot"></span>
              <h4 id="doingText">DOING (0)</h4>
            </div>
            <div class="tasks-container" id="doing-tasks"></div>
          </div>

          <div class="column-div" data-status="done">
            <div class="column-head-div">
              <span class="dot" id="done-dot"></span>
              <h4 id="doneText">DONE (0)</h4>
            </div>
            <div class="tasks-container" id="done-tasks"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- MOBILE MENU -->
    <div id="mobile-menu-overlay" class="mobile-menu-overlay">
      <div class="mobile-menu">
        <div class="mobile-menu-header">
          <h4>ALL BOARDS (1)</h4>
          <button id="mobile-close-btn">&times;</button>
        </div>

        <button class="board-btn active-board-btn">
          Launch Career
        </button>

        <div class="theme-toggle-div">
          <input type="checkbox" id="theme-toggle-mobile" />
        </div>
      </div>
    </div>

    <!-- EDIT MODAL -->
    <dialog id="task-modal">
      <div>
        <button id="close-modal-btn">&times;</button>

        <input id="task-title" />
        <textarea id="task-desc"></textarea>

        <select id="task-status">
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <select id="task-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <button id="save-task-btn" class="submit-btn">Save Changes</button>
        <button id="delete-task-btn" class="delete-btn">Delete Task</button>
      </div>
    </dialog>

    <!-- ADD TASK MODAL -->
    <dialog id="new-task-dialog">
      <form id="new-task-modal-window">
        <button type="button" id="cancel-add-btn">&times;</button>

        <input id="title-input" required />
        <textarea id="desc-input"></textarea>

        <select id="select-status">
          <option value="todo">todo</option>
          <option value="doing">doing</option>
          <option value="done">done</option>
        </select>

        <select id="select-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>

        <button type="submit" class="submit-btn">Create Task</button>
      </form>
    </dialog>
  </body>
</html>
